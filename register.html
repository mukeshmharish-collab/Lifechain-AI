<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeChain AI | Registration</title>
    <link rel="stylesheet" href="register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>

    <div class="register-container">
        <div class="logo-section">
            <h1>LifeChain AI</h1>
            <p>Create your secure digital healthcare identity.</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
            <div class="step">4</div>
        </div>

        <form id="registrationForm">
            <div class="form-step active">
                <h2>Personal Information</h2>

                <div class="input-group">
                    <label>Full Name</label>
                    <input id="fullName" type="text" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label>Date of Birth</label>
                    <input id="dob" type="date" required>
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Choose Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <button type="button" class="next-btn">Next</button>
            </div>

            <div class="form-step">
                <h2>Contact Details</h2>

                <div class="input-group">
                    <label>Email</label>
                    <input id="email" type="email" placeholder="Enter email" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input id="phone" type="tel" placeholder="10-digit mobile number" required>
                </div>

                <div class="input-group">
                    <label>Address</label>
                    <textarea id="address" rows="4" placeholder="Enter address"></textarea>
                </div>

                <div class="button-group">
                    <button type="button" class="prev-btn">Previous</button>
                    <button type="button" class="next-btn">Next</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Medical Information</h2>

                <div class="input-group">
                    <label>Blood Group</label>
                    <select id="bloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Existing Medical Conditions</label>
                    <textarea id="conditions" rows="4" placeholder="Diabetes, asthma, heart disease, allergies, etc."></textarea>
                </div>

                <div class="input-group">
                    <label>Current Medications</label>
                    <textarea id="medications" rows="3" placeholder="Mention current medicines"></textarea>
                </div>

                <div class="input-group">
                    <label>Emergency Contact Number</label>
                    <input id="emergencyContact" type="tel" placeholder="Guardian or family number" required>
                </div>

                <div class="input-group">
                    <label>Join LifeChain Blood Donor Network?</label>
                    <select id="bloodDonor">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </div>

                <div id="donorFields">
                    <div class="input-group">
                        <label>Last Blood Donation Date</label>
                        <input type="date">
                    </div>

                    <div class="input-group">
                        <label>Availability</label>
                        <select>
                            <option>Available Anytime</option>
                            <option>Weekends Only</option>
                            <option>Contact Before Donation</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="prev-btn">Previous</button>
                    <button type="button" class="next-btn">Next</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Security</h2>

                <div class="input-group">
                    <label>Create Password</label>
                    <input id="password" type="password" placeholder="Minimum 8 characters" required>
                    <small id="passwordStrength"></small>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Confirm password" required>
                </div>

                <div class="checkbox">
                    <input id="privacyConsent" type="checkbox" required>
                    <label for="privacyConsent">
                        I agree to securely store my healthcare information according to LifeChain AI's privacy policy.
                    </label>
                </div>

                <div class="button-group">
                    <button type="button" class="prev-btn">Previous</button>
                    <button type="submit" class="submit-btn">Create LifeChain ID</button>
                </div>
            </div>
        </form>
    </div>

    <script src="register.js"></script>
</body>
</html>
